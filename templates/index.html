<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompta .ai — Agent Comptable</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --border: #e5e5ea;
            --border-light: #f2f2f7;
            --accent: #0071e3;
            --green: #34c759;
            --orange: #ff9500;
            --red: #ff3b30;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .logout-btn {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: var(--border-light);
        }

        /* ── Main ── */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .page-desc {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* ── Drop Zone ── */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 56px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card);
            position: relative;
        }

        .dropzone:hover {
            border-color: var(--accent);
            background: rgba(0,113,227,0.02);
        }

        .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(0,113,227,0.04);
            transform: scale(1.01);
        }

        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .dropzone-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .dropzone-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .dropzone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* ── File List ── */
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-item-name {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-item-size {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .file-remove {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s;
        }

        .file-remove:hover {
            color: var(--red);
        }

        /* ── Process Button ── */
        .process-btn {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .process-btn:hover { background: #0077ED; }
        .process-btn:active { transform: scale(0.99); }
        .process-btn:disabled {
            background: var(--border);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        /* ── Loading ── */
        .loading {
            display: none;
            text-align: center;
            padding: 48px 0;
        }

        .loading.active { display: block; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .loading-sub {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* ── Results ── */
        .results {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .results.active { display: block; }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stat-value.green { color: var(--green); }
        .stat-value.orange { color: var(--orange); }
        .stat-value.red { color: var(--red); }

        /* ── Downloads ── */
        .downloads {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 32px;
        }

        .download-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s;
        }

        .download-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .download-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .download-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .download-icon.excel { background: #e8f5e9; }
        .download-icon.pdf-s { background: #e3f2fd; }
        .download-icon.pdf-x { background: #fff3e0; }

        .download-name {
            font-size: 14px;
            font-weight: 500;
        }

        .download-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .download-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: var(--border-light);
        }

        /* ── Detail Table ── */
        .detail-section h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .detail-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .detail-table th {
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg);
        }

        .detail-table td {
            font-size: 13px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .detail-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.ok { background: #e8f5e9; color: #2e7d32; }
        .badge.ko { background: #fff3e0; color: #e65100; }

        /* ── New Button ── */
        .new-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 32px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-btn:hover {
            background: var(--border-light);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .main { padding: 32px 16px 60px; }
            .page-title { font-size: 26px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 16px 20px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-logo">Kompta.ai</div>
        <div class="header-right">
            <span class="status-dot"></span>
            <span class="status-text">Connecte</span>
            <a href="/logout" class="logout-btn">Deconnexion</a>
        </div>
    </div>

    <div class="main">

        <!-- Upload Section -->
        <div id="upload-section">
            <h1 class="page-title">Saisie comptable</h1>
            <p class="page-desc">Deposez vos justificatifs PDF pour generer les ecritures Sage.</p>

            <div class="dropzone" id="dropzone">
                <div class="dropzone-icon">📄</div>
                <div class="dropzone-text">Glissez vos fichiers PDF ici</div>
                <div class="dropzone-hint">ou cliquez pour parcourir</div>
                <input type="file" id="fileInput" multiple accept=".pdf">
            </div>

            <div class="file-list" id="fileList"></div>

            <button class="process-btn" id="processBtn" disabled>Analyser les justificatifs</button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Analyse en cours...</div>
            <div class="loading-sub" id="loadingDetail">Traitement des justificatifs par l'IA</div>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <h1 class="page-title">Resultats</h1>
            <p class="page-desc" id="resultSummary"></p>

            <div class="stats" id="stats"></div>

            <div class="downloads" id="downloads"></div>

            <div class="detail-section">
                <h3>Detail des ecritures</h3>
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>Fichier</th>
                            <th>Statut</th>
                            <th>Ref</th>
                            <th>Libelle</th>
                        </tr>
                    </thead>
                    <tbody id="detailBody"></tbody>
                </table>
            </div>

            <button class="new-btn" onclick="resetAll()">Nouveau traitement</button>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const csrfToken = '{{ csrf_token }}';

        let selectedFiles = [];

        // Drag & Drop
        ['dragenter', 'dragover'].forEach(e => {
            dropzone.addEventListener(e, ev => {
                ev.preventDefault();
                dropzone.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(e => {
            dropzone.addEventListener(e, ev => {
                ev.preventDefault();
                dropzone.classList.remove('dragover');
            });
        });

        dropzone.addEventListener('drop', e => {
            const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
            addFiles(files);
        });

        fileInput.addEventListener('change', () => {
            addFiles(Array.from(fileInput.files));
            fileInput.value = '';
        });

        function addFiles(files) {
            files.forEach(f => {
                if (!selectedFiles.find(s => s.name === f.name)) {
                    selectedFiles.push(f);
                }
            });
            renderFiles();
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            renderFiles();
        }

        function renderFiles() {
            fileList.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item">
                    <span class="file-item-name">📎 ${f.name}</span>
                    <div style="display:flex;align-items:center;gap:12px">
                        <span class="file-item-size">${(f.size / 1024).toFixed(0)} Ko</span>
                        <button class="file-remove" onclick="removeFile(${i})">×</button>
                    </div>
                </div>
            `).join('');

            processBtn.disabled = selectedFiles.length === 0;
        }

        // Process
        processBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('loading').classList.add('active');

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('files', f));

            try {
                const resp = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'X-CSRF-Token': csrfToken },
                    body: formData
                });

                if (resp.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const data = await resp.json();

                if (data.error) {
                    alert('Erreur : ' + data.error);
                    resetAll();
                    return;
                }

                showResults(data);
            } catch (err) {
                alert('Erreur de connexion : ' + err.message);
                resetAll();
            }
        });

        function showResults(data) {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('results').classList.add('active');

            const s = data.summary;

            document.getElementById('resultSummary').textContent =
                `${s.total} justificatif(s) traite(s) — ${s.exploites} exploitable(s), ${s.inexploites} inexploitable(s)`;

            // Stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total</div>
                    <div class="stat-value">${s.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Exploites</div>
                    <div class="stat-value green">${s.exploites}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Rejetes</div>
                    <div class="stat-value ${s.inexploites > 0 ? 'orange' : ''}">${s.inexploites}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Equilibre</div>
                    <div class="stat-value ${s.equilibre ? 'green' : 'red'}">${s.equilibre ? '✓' : '✗'}</div>
                </div>
            `;

            // Downloads
            const dl = data.output_files;
            let dlHtml = '';

            if (dl.excel) {
                dlHtml += downloadCard('📊', 'excel', dl.excel.name, 'Import Sage — ecritures comptables');
            }
            if (dl.stamped_pdf) {
                dlHtml += downloadCard('📑', 'pdf-s', dl.stamped_pdf.name, 'Tickets vises avec tampon S');
            }
            if (dl.inexploitable_pdf) {
                dlHtml += downloadCard('⚠️', 'pdf-x', dl.inexploitable_pdf.name, 'Justificatifs a corriger');
            }

            document.getElementById('downloads').innerHTML = dlHtml;

            // Detail table
            const tbody = document.getElementById('detailBody');
            tbody.innerHTML = data.results_detail.map(r => {
                const libelle = r.status === 'exploitable'
                    ? (r.ecritures && r.ecritures[0] ? r.ecritures[0].libelle : '-')
                    : r.raison;
                return `<tr>
                    <td>${r.filename}</td>
                    <td><span class="badge ${r.status === 'exploitable' ? 'ok' : 'ko'}">${r.status === 'exploitable' ? 'OK' : 'Rejet'}</span></td>
                    <td>${r.reference || '-'}</td>
                    <td>${libelle || '-'}</td>
                </tr>`;
            }).join('');
        }

        function downloadCard(icon, type, filename, desc) {
            return `
                <div class="download-card">
                    <div class="download-info">
                        <div class="download-icon ${type}">${icon}</div>
                        <div>
                            <div class="download-name">${filename}</div>
                            <div class="download-desc">${desc}</div>
                        </div>
                    </div>
                    <a href="/api/download/${filename}" class="download-btn">Telecharger</a>
                </div>
            `;
        }

        function resetAll() {
            selectedFiles = [];
            fileList.innerHTML = '';
            processBtn.disabled = true;
            document.getElementById('upload-section').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
        }
    </script>
</body>
</html>
